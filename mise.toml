[tools]
node = "22.17.1"

[env]
# The electron package is only used for its TypeScript types
# (see src/plugin/ui/util.ts); skip the ~100MB binary download.
# electron's install.js only honors this bare environment variable
# (an .npmrc key would be exposed as npm_config_* and be ignored).
ELECTRON_SKIP_BINARY_DOWNLOAD = "1"

# --------------------------------------------------------------------------------
# Tasks: docs

[tasks."docs:init"]
run = "npm install"
sources = ["package.json", "package-lock.json"]
outputs = { auto = true }
dir = "docs"

[tasks.docs]
depends = ["docs:init"]
run = "npm run dev"
dir = "docs"

# --------------------------------------------------------------------------------
# Tasks: main

[tasks."main:init"]
run = "npm install"
sources = ["package.json", "package-lock.json"]
outputs = { auto = true }

[tasks."main:build"]
depends = ["main:init"]
run = "npm run build"

# Persistent watch build for development. Rebuilds automatically on save.
[tasks.dev]
depends = ["main:init"]
run = "npm run dev"

[tasks."main:test"]
depends = ["main:init"]
run = "npm run test"

[tasks."main:lint:fix"]
depends = ["main:init"]
run = "npm run lint:fix"

[tasks."pre-commit"]
depends = ["main:lint:fix", "main:test"]
run = "npm run lint:fix && npm run test"
